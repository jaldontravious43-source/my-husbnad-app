<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>老公别跑</title>
  <style>
    :root {
      --bg-a: #ffd7eb;
      --bg-b: #f4ccff;
      --panel: rgba(255, 255, 255, 0.86);
      --line: rgba(117, 34, 110, 0.2);
      --text: #40223b;
      --strong: #7d246f;
      --accent: #f44f90;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      touch-action: none;
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 14%, rgba(255, 255, 255, 0.75), transparent 32%),
        radial-gradient(circle at 88% 82%, rgba(255, 255, 255, 0.58), transparent 32%),
        linear-gradient(160deg, var(--bg-a), var(--bg-b));
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      z-index: 10;
      top: 10px;
      left: 10px;
      right: 10px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      pointer-events: none;
    }

    .item {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px;
      text-align: center;
      font-size: 13px;
    }

    .item b {
      display: block;
      color: var(--strong);
      font-size: 16px;
      margin-top: 2px;
    }

    #msg {
      position: absolute;
      z-index: 11;
      left: 50%;
      top: 66px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      color: var(--strong);
      min-width: 180px;
      text-align: center;
      pointer-events: none;
    }

    #game-root {
      width: 100%;
      height: 100%;
    }

    #overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      background: rgba(44, 11, 41, 0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .panel {
      width: min(460px, 100%);
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--line);
      box-shadow: 0 14px 42px rgba(46, 14, 42, 0.3);
      padding: 18px;
      text-align: center;
    }

    .panel h2 {
      margin: 0 0 8px;
      color: var(--strong);
    }

    .panel p {
      margin: 0 0 10px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 10px 16px;
      min-height: 40px;
      color: #fff;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #9a2f86);
      cursor: pointer;
      font-size: 14px;
    }

    @media (max-width: 680px) {
      #hud { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .item { font-size: 12px; }
      .item b { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="hud">
      <div class="item">分数<b id="score">0</b></div>
      <div class="item">目标<b id="target">1200</b></div>
      <div class="item">生命<b id="lives">3</b></div>
      <div class="item">时间<b id="time">60</b></div>
    </div>

    <div id="msg">点击任意位置发射钩子</div>
    <div id="game-root"></div>

    <div id="overlay">
      <div class="panel">
        <h2 id="result-title"></h2>
        <p id="result-text"></p>
        <button id="restart-btn" type="button">再来一局</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
  <script src="./game.js"></script>
</body>
</html>
